spring.application.name=taskflow-ai

# H2 in-memory database - zero setup required
spring.datasource.url=jdbc:h2:mem:taskflow;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.defer-datasource-initialization=true
spring.jpa.show-sql=false

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

server.port=8080

# Set the ANTHROPIC_API_KEY environment variable before starting the app.
anthropic.api.key=${ANTHROPIC_API_KEY:}
